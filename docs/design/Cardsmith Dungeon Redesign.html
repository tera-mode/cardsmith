<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Cardsmith — Dungeon Redesign</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Noto+Serif+JP:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">

  <style>
    html, body { margin: 0; padding: 0; background: #08060a; color: #f4e9d4; }
    body { min-height: 100vh; }
    * { box-sizing: border-box; }
    @keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }
    @keyframes fadein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script src="data.js"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="battle.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "tone": "heavy",
      "showTorches": true,
      "battleAutoOpen": false
    }/*EDITMODE-END*/;

    function App() {
      const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);

      // Apply tone to root via data attribute
      React.useEffect(() => {
        document.documentElement.dataset.tone = tweaks.tone === 'heavy' ? '' : tweaks.tone;
      }, [tweaks.tone]);

      return (
        <>
          <window.DesignCanvas defaultZoom={0.85}>
            <window.DCSection id="screens" title="Cardsmith — ダンジョン・ファンタジー リデザイン">

              <window.DCArtboard id="home" label="ホーム" width={406} height={796}>
                <div className="device-frame">
                  <window.HomeScreen />
                </div>
              </window.DCArtboard>

              <window.DCArtboard id="story" label="ストーリー" width={406} height={796}>
                <div className="device-frame">
                  <window.StoryScreen />
                </div>
              </window.DCArtboard>

              <window.DCArtboard id="battle" label="バトル（操作可能）" width={406} height={796}>
                <div className="device-frame">
                  <window.BattleScreen />
                </div>
              </window.DCArtboard>

              <window.DCArtboard id="collection" label="コレクション" width={406} height={796}>
                <div className="device-frame">
                  <window.CollectionScreen />
                </div>
              </window.DCArtboard>

              <window.DCArtboard id="forge" label="鍛冶" width={406} height={796}>
                <div className="device-frame">
                  <window.ForgeScreen />
                </div>
              </window.DCArtboard>

              <window.DCArtboard id="summon" label="召喚" width={406} height={796}>
                <div className="device-frame">
                  <window.SummonScreen />
                </div>
              </window.DCArtboard>

            </window.DCSection>
          </window.DesignCanvas>

          <window.TweaksPanel title="Tweaks">
            <window.TweakSection title="トーン">
              <window.TweakRadio label="雰囲気" value={tweaks.tone}
                                 onChange={v => setTweak('tone', v)}
                                 options={[
                                   { value: 'heavy', label: '重厚' },
                                   { value: 'vivid', label: '派手' },
                                   { value: 'muted', label: '渋い' },
                                 ]}/>
            </window.TweakSection>
          </window.TweaksPanel>
        </>
      );
    }

    // Wait for tweaks-panel + design-canvas to attach to window
    function start() {
      if (!window.DesignCanvas || !window.useTweaks) return setTimeout(start, 50);
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    }
    start();
  </script>
</body>
</html>
